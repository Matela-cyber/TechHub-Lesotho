<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, user-scalable=no"
    />
    <meta name="theme-color" content="#8B4513" />
    <!-- Aesthetic brown theme color -->

    <!-- Content Security Policy -->
    <meta
      http-equiv="Content-Security-Policy"
      content="script-src 'self' 'wasm-unsafe-eval' 'inline-speculation-rules' https://firestore.googleapis.com https://www.google.com https://www.gstatic.com https://apis.google.com https://www.recaptcha.net https://cdn.harshbanker.com;"
    />

    <!-- Prerender status detection -->
    <meta name="prerender-status-code" content="200" />

    <!-- Performance optimization - preconnect to origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preconnect"
      href="https://firestore.googleapis.com"
      crossorigin
    />
    <link rel="preconnect" href="https://i.imgur.com/" crossorigin />
    <link rel="preconnect" href="https://www.google.com" crossorigin />
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://apis.google.com" crossorigin />
    <link rel="preconnect" href="https://www.recaptcha.net" crossorigin />

    <!-- Preload critical assets -->
    <!-- Removed preload for logo192.png: not used immediately -->

    <!-- Bot Detection Script - Moved to external file -->
    <script src="%PUBLIC_URL%/js/bot-detection.js"></script>

    <!-- Default Meta Tags (will be replaced by dynamic tags for product pages) -->
    <meta
      name="description"
      content="Your online tech shop! We offer electronics, gadgets, and accessories to make your work and life easier."
    />
    <meta name="author" content="techhublesotho.com" />

    <!-- OpenGraph Tags - Will be replaced by server-side rendering for bots -->
    <meta
      property="og:title"
      content="TechHub Lesotho - Your Online Tech Shop"
    />
    <meta
      property="og:description"
      content="Visit TechHub Lesotho for electronics, gadgets, and accessories. Make your work and life easier with our curated tech collection!"
    />
    <meta property="og:image" content="/icons/logo-512.png" />
    <meta property="og:url" content="https://techhublesotho.com" />
    <meta property="og:type" content="website" />
    <meta
      property="og:site_name"
      content="TechHub Lesotho - Technology for You"
    />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="TechHub Lesotho - Your Friendly Tech Shop"
    />
    <meta
      name="twitter:description"
      content="Shop electronics, gadgets, and accessories for your tech needs in Lesotho!"
    />
    <meta name="twitter:image" content="/icons/logo-512.png" />

    <!-- PWA support -->
    <meta name="application-name" content="TechHub Lesotho" />
    <meta name="msapplication-TileColor" content="#8B4513" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="TechHub Lesotho" />
    <meta name="format-detection" content="telephone=no" />

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="apple-touch-startup-image" href="%PUBLIC_URL%/splash.png" />
    <link
      rel="manifest"
      href="%PUBLIC_URL%/manifest.json"
      crossorigin="use-credentials"
    />
    <title>TechHub Lesotho - Your Friendly Tech Shop</title>

    <!-- Inline critical CSS to avoid render-blocking -->
    <style>
      /* Critical CSS for initial render */
      body {
        margin: 0;
        padding: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
        background-color: #f9fafb;
      }
      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      /* Hide reCAPTCHA badge on mobile */
      .grecaptcha-badge {
        visibility: hidden;
      }
    </style>

    <!-- Prerender.io support - Moved to external file -->
    <script src="%PUBLIC_URL%/js/prerender-support.js"></script>
  </head>
  <body>
    <noscript>Please enable JavaScript to use this website.</noscript>
    <div id="root"></div>
  </body>
</html>
